# Box Transport Velocity Configuration
#
# ONNX model outputs raw actions in Isaac joint order (no baked scale/reorder).
# Action scale, default positions, and joint mappings are read from ONNX metadata.
# This file only configures PD gains and velocity command ranges.

onnx_path: "box_transport_velocity.onnx"

# Velocity command range (maps joystick [-1,1] to training command range)
cmd_range: {lin_vel_x: [-0.5, 1.0], lin_vel_y: [-0.3, 0.3], ang_vel_z: [-0.2, 0.2]}

# PD control gains (29 DOF, MuJoCo joint order)
# Values MUST match training actuator stiffness/damping from env.yaml
kps: [ 40.18,  99.10,  40.18,  # left_hip (pitch, roll, yaw)
       99.10,  28.50,  28.50,  # left_knee, left_ankle (pitch, roll)
       40.18,  99.10,  40.18,  # right_hip (pitch, roll, yaw)
       99.10,  28.50,  28.50,  # right_knee, right_ankle (pitch, roll)
       40.18,  28.50,  28.50,  # waist (yaw, roll, pitch)
       14.25,  14.25,  14.25,  # left_shoulder (pitch, roll, yaw)
       14.25,                   # left_elbow
       14.25,  16.78,  16.78,  # left_wrist (roll, pitch, yaw)
       14.25,  14.25,  14.25,  # right_shoulder (pitch, roll, yaw)
       14.25,                   # right_elbow
       14.25,  16.78,  16.78]  # right_wrist (roll, pitch, yaw)

kds: [ 2.558,  6.309,  2.558,  # left_hip (pitch, roll, yaw)
       6.309,  1.814,  1.814,  # left_knee, left_ankle (pitch, roll)
       2.558,  6.309,  2.558,  # right_hip (pitch, roll, yaw)
       6.309,  1.814,  1.814,  # right_knee, right_ankle (pitch, roll)
       2.558,  1.814,  1.814,  # waist (yaw, roll, pitch)
       0.907,  0.907,  0.907,  # left_shoulder (pitch, roll, yaw)
       0.907,                   # left_elbow
       0.907,  1.068,  1.068,  # left_wrist (roll, pitch, yaw)
       0.907,  0.907,  0.907,  # right_shoulder (pitch, roll, yaw)
       0.907,                   # right_elbow
       0.907,  1.068,  1.068]  # right_wrist (roll, pitch, yaw)
