# Per-term scales & clips. Matches dual_agent_velocity_env_cfg.py obs groups.
# Note: lower.base_lin_vel has NO scale (training cfg omits scale= on that term).
ang_vel_scale: 0.2
lin_vel_scale: 1.0
gravity_scale: 1.0
cmd_scale: [1.0, 1.0, 1.0]
dof_pos_scale: 1.0
dof_vel_scale: 0.05
obs_clip_default: 100.0
last_action_clip: 12.0

num_actions: 29
history_length_upper: 5
num_obs_upper: 480   # (3 + 3 + 3 + 29 + 29 + 29) × 5
num_obs_lower: 99    # 3 + 3 + 3 + 3 + 29 + 29 + 29 (single frame)

# Hard switch: same argument as BoxTransportVelocity — new policies have
# enough domain randomization in training (actuator gains, pushes, pose
# resets) that a single PD-hold tick at the target default pose is enough.
control_dt: 0.02
ramp_time: 0.02
ramp_kp_scale: 1.0
ramp_kd_scale: 1.0

cmd_init: [0, 0, 0]
cmd_range:
  lin_vel_x: [-0.5, 1.0]
  lin_vel_y: [-0.3, 0.3]
  ang_vel_z: [-0.2, 0.2]
