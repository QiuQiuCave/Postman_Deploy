# Per-term obs scales & clips from training policy obs_group.
ang_vel_scale: 0.2
gravity_scale: 1.0
cmd_scale: [1.0, 1.0, 1.0]
dof_pos_scale: 1.0
dof_vel_scale: 0.05
obs_clip_default: 100.0
last_action_clip: 12.0

history_length: 1
num_actions: 29
num_obs: 96    # single frame: 3 + 3 + 3 + 29 + 29 + 29 = 96

# Pose ramp-in before policy inference starts. Linearly interpolates from the
# previous policy's last motor pose to default_angles using box_transport's PD,
# avoiding the OOD joint_pos_rel that an instant switch would feed the policy
# (training had position_range=(1.0,1.0), i.e. zero joint reset randomization).
control_dt: 0.02
ramp_time: 2.0

# Deployment command ranges (UniformVelocityCommandCfg.limit_ranges).
cmd_init: [0, 0, 0]
cmd_range:
  lin_vel_x: [-0.5, 1.0]
  lin_vel_y: [-0.3, 0.3]
  ang_vel_z: [-0.2, 0.2]
