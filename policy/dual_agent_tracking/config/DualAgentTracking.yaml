gravity_scale: 1.0
cmd_scale: [1.0, 1.0, 1.0]
dof_pos_scale: 1.0
dof_vel_scale: 0.05
obs_clip_default: 100.0
last_action_clip: 12.0

# Lower-body has NO per-term scales / clips in tracking cfg (unlike velocity).
# joint_pos_rel, joint_vel_rel, base_lin_vel, base_ang_vel, gravity: raw.

num_actions: 29
history_length_upper: 5
num_obs_upper: 480   # (3 + 3 + 3 + 29 + 29 + 29) × 5
num_obs_lower: 121   # 30 (lower_body_command pos+vel) + 3 + 6 + 3 + 3 + 3 + 29 + 29 + 15

